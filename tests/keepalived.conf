# Minimal valid VRRP config used only by tests/smoke.sh to exercise
# keepalived's config-test mode (-t). Not a runtime config.
#
# enable_script_security + vrrp_script/track_script are included so `-t`
# parses the script-security code path — the #1 documented operator footgun.
# /bin/true is used so no real script file/permissions are needed for a
# parse-only check (`-t` exercises directive PARSING, not the runtime
# permission check on mounted script paths).
#
# script_user root is required because enable_script_security makes keepalived
# validate that the script's run-as user exists; the image has no
# keepalived_script user, so without this `-t` fails (rc 5). root is fine for a
# parse-only test config that never executes the script.
global_defs {
    enable_script_security
    script_user root
}

vrrp_script chk_test {
    script "/bin/true"
    interval 2
    weight 2
}

vrrp_instance VI_TEST {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    virtual_ipaddress {
        192.168.255.254/24
    }
    track_script {
        chk_test
    }
}
