# Minimal valid VRRP config used only by tests/smoke.sh to exercise
# keepalived's config-test mode (-t). Not a runtime config.
vrrp_instance VI_TEST {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    virtual_ipaddress {
        192.168.255.254/24
    }
}
