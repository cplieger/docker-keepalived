# Example compose for docker-keepalived. See the README for all configuration options and hardening.
services:
  keepalived:
    image: ghcr.io/cplieger/docker-keepalived:latest
    container_name: keepalived
    restart: unless-stopped

    # VRRP multicast on a real LAN interface needs host networking + raw-socket/admin caps.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Mount your keepalived.conf (+ any track/notify scripts) here. If the conf sets
    # enable_script_security, the mount must be root-owned and not group-writable or the
    # scripts are silently disabled. See README "enable_script_security".
    volumes:
      - "./keepalived:/etc/keepalived:ro"
