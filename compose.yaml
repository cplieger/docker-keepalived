services:
  keepalived:
    image: ghcr.io/cplieger/docker-keepalived:latest
    container_name: keepalived
    restart: unless-stopped

    # VRRP needs host networking plus raw-socket + admin capabilities.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Mount your keepalived.conf — and any track-script / notify helpers
    # it references — into /etc/keepalived. A scripts/ subdir is the most
    # natural layout; keepalived.conf would then point at e.g.
    #   script "/etc/keepalived/scripts/check_app.sh"
    #   notify "/etc/keepalived/scripts/notify.sh"
    #
    # SECURITY NOTE — enable_script_security:
    # If your keepalived.conf sets `enable_script_security` in global_defs
    # (recommended), keepalived refuses to execute scripts whose path has
    # any non-root-writable component. Make sure the host-side mount source
    # (and its scripts subdir, if any) are owned by root:root and not
    # group/world-writable, otherwise track scripts will be silently
    # disabled with "Unsafe permissions found … - disabling" in the log.
    volumes:
      - ./keepalived:/etc/keepalived:ro
